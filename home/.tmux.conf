# @docstring
# Tmux Configuration File
# Architecture: Native UI Component Design, Absolute Centered Predawn Pills, Zero-bloat.
# Palette: Predawn (Jamie Wilson) — warm dark grays with muted syntax accents.

# @docstring
# Core Editor and Terminal integrations.
# CRITICAL: Optimized for 0ms latency in Neovim and full 24-bit TrueColor rendering.
set-option -s escape-time 0
set-option -g focus-events on
set-option -g default-terminal "tmux-256color"
set-option -a -g terminal-overrides ",xterm-256color:RGB"
set-option -g mouse on

# @docstring
# Window & Pane Indexing.
set-option -g base-index 1
set-option -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# @docstring
# Keybindings: Prefix and Splits.
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ==========================================
# UI/UX: PREDAWN PILL ARCHITECTURE
# ==========================================
# Design language:
#   • Rounded pill caps (U+E0B6 , U+E0B4 ) — premium editorial feel
#   • Nerd Font icons per widget (git branch, folder, calendar, clock)
#   • Two-row bar: row 0 = pills, row 1 = negative space (breathing room)
#   • Chain of rounded pills on the right: git · cwd · date · time
#   • Session pill (left) turns warm-red during prefix (visual cue)
#
# Palette anchors (Predawn — Jamie Wilson):
#   bg-deep    #282828   bg-subtle  #3e3e3e   fg-primary #f1f1f1   fg-muted #c9c7be
#   blue       #8197bf   yellow     #f4bf75   green      #99ad6a
#   orange     #e0a374   red-warm   #cf6a4c   purple     #b294bb

# @docstring
# Status Bar placement and global styles.
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=#282828,fg=#f1f1f1"
set -g status-left-length 200
set -g status-right-length 200

# @docstring
# Vertical Rhythm: 2-row status; second row is intentional negative space.
set -g status 2
set -g status-format[1] ""

# @docstring
# Left: Session pill (blue with terminal icon). Flips warm-red during prefix.
set -g status-left "#{?client_prefix,#[fg=#cf6a4c#,bg=#282828]#[fg=#282828#,bg=#cf6a4c#,bold] ●  #S #[fg=#cf6a4c#,bg=#282828] ,#[fg=#8197bf#,bg=#282828]#[fg=#282828#,bg=#8197bf#,bold]   #S #[fg=#8197bf#,bg=#282828] }"

# @docstring
# Right: Chain of 4 rounded pills — git branch · cwd · date · time.
# Each pill uses subtle bg-mid (#3e3e3e) with a color-coded icon (predawn accent).
set -g status-right "#[fg=#3e3e3e,bg=#282828]#[fg=#99ad6a,bg=#3e3e3e]  #(cd '#{pane_current_path}' 2>/dev/null && git symbolic-ref --short HEAD 2>/dev/null || echo '—') #[fg=#3e3e3e,bg=#282828] #[fg=#3e3e3e,bg=#282828]#[fg=#8197bf,bg=#3e3e3e]  #{b:pane_current_path} #[fg=#3e3e3e,bg=#282828] #[fg=#3e3e3e,bg=#282828]#[fg=#e0a374,bg=#3e3e3e]  %d/%m #[fg=#3e3e3e,bg=#282828] #[fg=#3e3e3e,bg=#282828]#[fg=#f4bf75,bg=#3e3e3e]  %H:%M #[fg=#3e3e3e,bg=#282828] "

# @docstring
# Window Status: Inactive Tab (subtle bg-mid rounded pill).
set -g window-status-format "#[fg=#3e3e3e,bg=#282828]#[fg=#c9c7be,bg=#3e3e3e] #I  #W #[fg=#3e3e3e,bg=#282828]"

# @docstring
# Window Status: Active Tab (predawn yellow rounded pill — signature accent).
set -g window-status-current-format "#[fg=#f4bf75,bg=#282828]#[fg=#282828,bg=#f4bf75,bold] #I  #W #[fg=#f4bf75,bg=#282828]"

# @docstring
# Window Separator: Negative space between pills.
set -g window-status-separator " "

# @docstring
# Pane Borders: thin, yellow accent for active (matches active window pill).
set -g pane-border-style "fg=#3e3e3e"
set -g pane-active-border-style "fg=#f4bf75"

# @docstring
# Message / command line styling (matches predawn accent).
set -g message-style "fg=#282828,bg=#f4bf75,bold"
set -g message-command-style "fg=#f1f1f1,bg=#3e3e3e"

# @docstring
# Mode (copy/selection) styling.
set -g mode-style "fg=#282828,bg=#8197bf,bold"

# ==========================================
# ERGONOMICS: SEAMLESS NAVIGATION & VISUALS
# ==========================================

# @docstring
# Visual Focus: Dim inactive panes to highlight the active workspace.
# Uses Predawn color palette coordinates.
set -g window-style 'fg=#a0a0a0,bg=#1e1e1e'
set -g window-active-style 'fg=#f1f1f1,bg=#282828'

# @docstring
# Smart pane switching with awareness of Neovim splits.
# Allows using C-h/j/k/l to navigate seamlessly across both Tmux and Neovim.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# @docstring
# Ergonomic Resizing: Use Prefix + H/J/K/L to resize panes quickly.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# @docstring
# Ephemeral Workspace: Open a floating terminal popup centered on the screen.
# Explicitly unbinds default Tmux finding behavior to prevent collisions.
unbind f
unbind g
bind f display-popup -d '#{pane_current_path}' -w80% -h80% -E "$SHELL"
bind g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# @docstring
# Quick reload: Prefix + r reloads config in place (no session restart needed).
bind r source-file ~/.tmux.conf \; display-message " ~/.tmux.conf reloaded "

# ==========================================
# PLUGINS
# ==========================================

# @docstring
# Tmux Plugin Manager (TPM).
# The external UI plugin was removed to enforce the native layout.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# @docstring
# Initializes TPM. MUST be the absolute last line.
run '~/.tmux/plugins/tpm/tpm'
